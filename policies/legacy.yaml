name: legacy
max_review_cycles: 2
max_parallel_tickets: 1
require_tests: true
require_lint: false
require_format: false
max_files_changed: 100
protected_paths:
  - vendor/
dependency_change_rules:
  allow_lockfile_updates: true
escalation_rules:
  on_protected_path_change: true
  on_retry_exhausted: true
approval_mode: review_go
approval_risk_level: high
multi_approval_count: 2
risk_weights:
  blast_radius_medium: 1
  blast_radius_large: 2
  protected_path: 3
  repo_risky_path: 2
  dependency_change: 1
  dependency_change_restricted: 2
  migration_change: 3
  sensitive_area: 2
  ticket_sensitive_domain: 1
risk_thresholds:
  medium: 4
  high: 7
  critical: 11
sensitive_path_patterns:
  - auth/
  - billing/
  - infra/
