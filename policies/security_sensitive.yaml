name: security_sensitive
max_review_cycles: 1
require_tests: true
require_lint: true
require_format: true
max_files_changed: 8
protected_paths:
  - auth/
  - .github/
dependency_change_rules:
  allow_lockfile_updates: false
escalation_rules:
  on_protected_path_change: true
  on_retry_exhausted: true

