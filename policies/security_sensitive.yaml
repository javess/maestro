name: security_sensitive
max_review_cycles: 1
require_tests: true
require_lint: true
require_format: true
max_files_changed: 8
protected_paths:
  - auth/
  - .github/
dependency_change_rules:
  allow_lockfile_updates: false
escalation_rules:
  on_protected_path_change: true
  on_retry_exhausted: true
approval_mode: multi_go
approval_risk_level: medium
multi_approval_count: 2
risk_weights:
  blast_radius_medium: 3
  blast_radius_large: 5
  protected_path: 5
  repo_risky_path: 4
  dependency_change: 3
  dependency_change_restricted: 5
  migration_change: 5
  sensitive_area: 4
  ticket_sensitive_domain: 3
risk_thresholds:
  medium: 2
  high: 5
  critical: 8
sensitive_path_patterns:
  - auth/
  - billing/
  - payments/
  - infra/
  - deploy/
  - k8s/
