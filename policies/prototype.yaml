name: prototype
max_review_cycles: 3
max_parallel_tickets: 2
require_tests: false
require_lint: true
require_format: true
max_files_changed: 50
protected_paths: []
dependency_change_rules:
  allow_lockfile_updates: true
escalation_rules:
  on_protected_path_change: false
  on_retry_exhausted: true
approval_mode: auto_go
approval_risk_level: critical
multi_approval_count: 2
risk_weights:
  blast_radius_medium: 1
  blast_radius_large: 2
  protected_path: 2
  repo_risky_path: 1
  dependency_change: 0
  dependency_change_restricted: 1
  migration_change: 2
  sensitive_area: 1
  ticket_sensitive_domain: 0
risk_thresholds:
  medium: 4
  high: 7
  critical: 11
sensitive_path_patterns:
  - auth/
  - billing/
  - infra/
