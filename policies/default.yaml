name: default
max_review_cycles: 2
max_parallel_tickets: 1
require_tests: true
require_lint: true
require_format: true
max_files_changed: 20
protected_paths:
  - .github/
dependency_change_rules:
  allow_lockfile_updates: true
escalation_rules:
  on_protected_path_change: true
  on_retry_exhausted: true
approval_mode: auto_go
approval_risk_level: high
multi_approval_count: 2
risk_weights:
  blast_radius_medium: 2
  blast_radius_large: 4
  protected_path: 4
  repo_risky_path: 3
  dependency_change: 2
  dependency_change_restricted: 4
  migration_change: 4
  sensitive_area: 3
  ticket_sensitive_domain: 2
risk_thresholds:
  medium: 3
  high: 6
  critical: 10
sensitive_path_patterns:
  - auth/
  - billing/
  - payments/
  - infra/
  - deploy/
  - k8s/
