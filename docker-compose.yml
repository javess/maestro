version: "3.9"

services:
  maestro:
    build: .
    working_dir: /app
    volumes:
      - .:/app
    command: ["uv", "run", "maestro", "doctor"]
  ui:
    image: node:22
    working_dir: /app/ui
    volumes:
      - .:/app
    command: ["sh", "-lc", "npm install && npm run dev -- --host 0.0.0.0"]
    ports:
      - "5173:5173"

